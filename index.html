<!DOCTYPE html>
<html>
<head>
<title>eCube TVET Inventory</title>

<style>
footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
  background:#007bff;
  color:white;
  font-weight:bold;
}
body{
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#eef5ff,#d6e9ff);
margin:0;
padding:0;
}

.header{
background:linear-gradient(135deg,#0d6efd,#00c6ff);
color:white;
text-align:center;
padding:15px;
}
.logo-e{
    font-size:50px;
    font-weight:bold;
}
.logo{
width:180px;
display:block;
margin:10px auto;
}

.container{
padding:15px;
}
input{
border-radius:10px;
}

button{
border-radius:10px;
}

table{
border-radius:10px;
overflow:hidden;
}
input,button{
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
input{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
color:black;
}

th{
background:#0d6efd;
color:white;
}

.deleteBtn{
background:red;
color:white;
padding:8px;
border:none;
border-radius:5px;
}
  .dashboard{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}

.card{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  width:120px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<h2><span class="logo-e">e</span>Cube TVET College</h2>
<h3>Inventory Management System</h3>
  <div class="dashboard">
  <div class="card">
    <h3>Total Items</h3>
    <p id="totalCard">0</p>
  </div>

  <div class="card">
    <h3>Low Stock</h3>
    <p id="lowStockCard">0</p>
  </div>
  </div>
<p id="totalItems">Total Items: 0</p>
</div>

<div class="container">
<input type="text" id="category" placeholder="Category">

<input type="text" id="itemName" placeholder="Item Name">
<input type="text" id="location" placeholder="Location">

<input type="number" id="qty" placeholder="Quantity">
<button onclick="addItem()">Add Item</button>

<input type="text" id="search" placeholder="Search Item">
<button onclick="exportCSV()">Export CSV</button>
<table>
<thead>
<tr>
<th>Category</th>
<th>Item</th>
<th>Location</th>
<th>Date</th>
<th>Quantity</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="inventoryTable">
</tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyAFgbWqQv7FgQUkCEhXsXrhQxHaw84XHNw",
authDomain: "e-cube-inventory.firebaseapp.com",
projectId: "e-cube-inventory",
storageBucket: "e-cube-inventory.firebasestorage.app",
messagingSenderId: "281755536716",
appId: "1:281755536716:web:6d529ba17a2ce36c3813e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let items = JSON.parse(localStorage.getItem("inventory")) || [];

function saveData(){
localStorage.setItem("inventory",JSON.stringify(items));
}

function displayItems(){

let table=document.getElementById("inventoryTable");

table.innerHTML="";

document.getElementById("totalItems").innerText =
"Total Items: " + items.length;
document.getElementById("totalCard").innerText = items.length;

let lowStock = items.filter(item => item.qty < 5).length;
document.getElementById("lowStockCard").innerText = lowStock;

items.forEach((item,index)=>{


table.innerHTML += `
<tr>
<td>${item.category}</td>
<td>${item.name}</td>
<td>${item.location}</td>
<td>${item.date}</td>
<td>${item.qty}</td>
<td>${item.qty < 5 ? "⚠️ Low Stock" : "✅ OK"}</td>
<td>
<button onclick="editItem(${index})">Edit</button>
<button class="deleteBtn" onclick="deleteItem(${index})">Delete</button>
</td>
</tr>
`;

});

}

function addItem(){
let category = document.getElementById("category").value;
let name=document.getElementById("itemName").value;
let location = document.getElementById("location").value;
let qty=document.getElementById("qty").value;

if(category=="" || name=="" || location=="" || qty==""){
alert("Enter Category, Item and Quantity");
return;
}

items.push({
category:category,
name:name,
location:location,
date: new Date().toLocaleDateString(),
qty:qty
});

saveData();
displayItems();

document.getElementById("itemName").value="";
document.getElementById("qty").value="";
}
function editItem(index){
let newName = prompt("Edit Item Name", items[index].name);
let newQty = prompt("Edit Quantity", items[index].qty);

if(newName !== null && newQty !== null){
items[index].name = newName;
items[index].qty = newQty;

saveData();
displayItems();
}
}

function deleteItem(index){
items.splice(index,1);

saveData();
displayItems();
}
  
function exportCSV() {
let csv = "Category,Item,Date,Quantity\n";

items.forEach(item => {
csv += `${item.category},${item.name},${item.date},${item.qty}\n`;
});

let blob = new Blob([csv], { type: "text/csv" });
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "inventory.csv";
a.click();
  }


function searchItem(){

let value=document.getElementById("search").value.toLowerCase();

let rows = document.querySelectorAll("#inventoryTable tr");

rows.forEach(row=>{
if(!row.innerText) return;
let text=row.innerText.toLowerCase();

if(text.includes(value)){
row.style.display="";
}else{
row.style.display="none";
}

});

}
window.addEventListener("beforeunload", function() {
    saveData();
});
document.getElementById("search")
.addEventListener("keyup", searchItem);
displayItems();

</script>
<footer>
Developed by Kavi Arasan © 2026
</footer>

</body>
</html>
